<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ app_title }} - Chart Export</title>
  <link rel="stylesheet" href="/static/css/theme.css?v=28" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body class="export-page" data-api-base-url="{{ api_base_url }}">

  <header class="export-toolbar">
    <div class="export-toolbar-left">
      <h1 class="export-toolbar-title">Chart Export</h1>

      {% if show_pipeline_switcher %}
      <div class="export-control-group pipeline-switcher">
        <label class="filter-label" for="pipeline-select">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:2px"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v10M4.22 4.22l4.24 4.24m7.08 7.08l4.24 4.24M1 12h6m6 0h10M4.22 19.78l4.24-4.24m7.08-7.08l4.24-4.24"/></svg>
          DB
        </label>
        <select id="pipeline-select" class="filter-select" aria-label="Database pipeline">
          {% if pipeline_info and pipeline_info.available %}
            {% for p in pipeline_info.available %}
              <option value="{{ p.id }}" {% if p.current %}selected{% endif %}>{{ p.label }}</option>
            {% endfor %}
          {% else %}
            <option value="solstice">Solstice</option>
            <option value="onyc">Onyc</option>
          {% endif %}
        </select>
      </div>
      {% endif %}

      <div class="export-control-group">
        <label class="filter-label" for="chart-select">Chart</label>
        <select id="chart-select" class="filter-select export-chart-select">
          <option value="" selected disabled>Select a chart…</option>
          {% set ns = namespace(current_page='') %}
          {% for chart in chart_catalogue %}
            {% if chart.page_label != ns.current_page %}
              {% if ns.current_page %}
                </optgroup>
              {% endif %}
              {% set ns.current_page = chart.page_label %}
              <optgroup label="{{ chart.page_label }}">
            {% endif %}
            <option
              value="{{ chart.widget_id }}"
              data-endpoint="{{ chart.endpoint }}"
              data-page-id="{{ chart.page_id }}"
              data-source-widget-id="{{ chart.source_widget_id }}"
              data-protocol-override="{{ chart.protocol_override }}"
              data-show-pp="{{ 'true' if chart.show_protocol_pair else 'false' }}"
              data-show-mkt="{{ 'true' if chart.show_markets else 'false' }}"
            >{{ chart.widget_title }}</option>
          {% endfor %}
          {% if ns.current_page %}
            </optgroup>
          {% endif %}
        </select>
      </div>

      <div class="export-control-group">
        <label class="filter-label" for="ratio-select">Ratio</label>
        <select id="ratio-select" class="filter-select">
          <optgroup label="Landscape">
            <option value="1920x1080" selected>16:9  (1920 x 1080)</option>
            <option value="1700x1000">17:10  (1700 x 1000)</option>
            <option value="1200x628">1.91:1  (1200 x 628)</option>
            <option value="1500x750">2:1  (1500 x 750)</option>
          </optgroup>
          <optgroup label="Square">
            <option value="1080x1080">1:1  (1080 x 1080)</option>
          </optgroup>
          <optgroup label="Portrait">
            <option value="1080x1350">4:5  (1080 x 1350)</option>
            <option value="1080x1920">9:16  (1080 x 1920)</option>
            <option value="1080x1536">9:12.8  (1080 x 1536)</option>
          </optgroup>
        </select>
      </div>

      <div class="export-control-group">
        <label class="filter-label" for="last-window-select">Window</label>
        <select id="last-window-select" class="filter-select">
          <option value="1h">1h</option>
          <option value="4h">4h</option>
          <option value="6h">6h</option>
          <option value="24h">24h</option>
          <option value="7d" selected>7d</option>
          <option value="30d">30d</option>
          <option value="90d">90d</option>
        </select>
      </div>

      <div class="export-control-group">
        <label class="filter-label" for="font-scale-select">Font</label>
        <select id="font-scale-select" class="filter-select">
          <option value="1">1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5" selected>1.5x</option>
          <option value="1.75">1.75x</option>
          <option value="2">2x</option>
          <option value="2.5">2.5x</option>
        </select>
      </div>

      <div class="export-control-group">
        <label class="filter-label" for="format-select">Format</label>
        <select id="format-select" class="filter-select">
          <option value="webp" selected>WebP</option>
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
        </select>
      </div>

      <div class="export-control-group">
        <label class="filter-label" for="pixel-ratio-select">Quality</label>
        <select id="pixel-ratio-select" class="filter-select">
          <option value="2" selected>2x (Retina)</option>
          <option value="3">3x (High-DPI)</option>
          <option value="1">1x (Standard)</option>
        </select>
      </div>
    </div>

    <div class="export-toolbar-right">
      <button id="download-btn" class="action-button export-download-btn" type="button" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="download-btn-label">Download WebP</span>
      </button>
      <button id="theme-toggle" class="theme-toggle icon-button" type="button" aria-label="Toggle theme">
        <span id="theme-icon" class="theme-icon" aria-hidden="true">🌙</span>
      </button>
    </div>
  </header>

  <!-- Contextual data filters: shown when the selected chart has page-level or widget-level filters -->
  <div id="export-context-filters" class="export-context-bar" hidden>

    <div id="ctx-protocol-pair" class="export-control-group" hidden>
      <label class="filter-label" for="protocol-select">Protocol</label>
      <select id="protocol-select" class="filter-select" aria-label="Protocol">
        <option value="raydium">raydium</option>
      </select>
      <label class="filter-label" for="pair-select">Pair</label>
      <select id="pair-select" class="filter-select" aria-label="Pair">
        <option value="USX-USDC">USX-USDC</option>
      </select>
    </div>

    <div id="ctx-markets" class="export-control-group" hidden>
      <label class="filter-label" for="mkt1-select">Market 1</label>
      <select id="mkt1-select" class="filter-select" aria-label="Market 1">
        <option value="">Loading…</option>
      </select>
      <label class="filter-label" for="mkt2-select">Market 2</label>
      <select id="mkt2-select" class="filter-select" aria-label="Market 2">
        <option value="">Loading…</option>
      </select>
    </div>

    <div id="ctx-flow-mode" class="export-control-group" hidden>
      <label class="filter-label">Token</label>
      <select id="export-flow-mode" class="filter-select" aria-label="Flow token">
        <option value="usx" selected>USX</option>
        <option value="usdc">USDC</option>
      </select>
    </div>

    <div id="ctx-distribution-mode" class="export-control-group" hidden>
      <label class="filter-label">Event</label>
      <select id="export-distribution-mode" class="filter-select" aria-label="Distribution mode">
        <option value="sell-order" selected>Sell Swaps</option>
        <option value="net-sell-pressure">1hr Net Sell Pressure</option>
      </select>
    </div>

    <div id="ctx-ohlcv-interval" class="export-control-group" hidden>
      <label class="filter-label">Candle</label>
      <select id="export-ohlcv-interval" class="filter-select" aria-label="OHLCV interval">
        <option value="1m">1m</option>
        <option value="5m">5m</option>
        <option value="15m">15m</option>
        <option value="1h" selected>1h</option>
        <option value="4h">4h</option>
        <option value="1d">1d</option>
      </select>
    </div>

    <div id="ctx-impact-mode" class="export-control-group" hidden>
      <label class="filter-label">Mode</label>
      <select id="export-impact-mode" class="filter-select" aria-label="Impact mode">
        <option value="size" selected>Order Size for Target bps</option>
        <option value="impact">Impact bps at 3 Size Levels</option>
      </select>
    </div>

    <div id="ctx-health-schema" class="export-control-group" hidden>
      <label class="filter-label">Domain</label>
      <select id="export-health-schema" class="filter-select" aria-label="Health domain">
        <option value="dexes" selected>dexes</option>
        <option value="exponent">exponent</option>
        <option value="kamino_lend">kamino_lend</option>
        <option value="solstice_proprietary">solstice_proprietary</option>
        <option value="cross_protocol">cross_protocol</option>
      </select>
    </div>

    <div id="ctx-health-attribute" class="export-control-group" hidden>
      <label class="filter-label">Metric</label>
      <select id="export-health-attribute" class="filter-select" aria-label="Health metric">
        <option value="Write Rate" selected>Write Rate (rows/min)</option>
        <option value="Queue Size">Queue Size (% capacity)</option>
        <option value="Gap Size">Gap Size (seconds)</option>
        <option value="Failures">Failures (avg. per interval)</option>
      </select>
    </div>

  </div>

  <main class="export-canvas-area">
    <div id="export-frame" class="export-frame" style="width:1920px;height:1080px;">
      <section
        id="widget-export-target"
        class="panel widget-loader export-widget"
        data-widget-id="export-target"
        data-widget-kind="chart"
        data-expandable="false"
        data-impact-mode="size"
        data-flow-mode="usx"
        data-health-schema="dexes"
        data-health-attribute="Write Rate"
        data-health-base-schema="dexes"
        hx-swap="none"
        hx-trigger="export-load"
        hx-request='{"timeout":90000}'
      >
        <div class="panel-header">
          <div class="panel-title-group">
            <h3 id="export-chart-title">Select a chart to preview</h3>
          </div>
          <span class="panel-updated" id="updated-export-target"></span>
        </div>
        <div class="chart-subtitle" id="chart-subtitle-export-target"></div>
        <div class="panel-body">
          <div id="chart-export-target" class="chart-canvas" style="width:100%;height:100%;"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="/static/js/theme.js?v=2"></script>
  <script src="/static/js/charts.js?v=48"></script>
  <script>
  (function () {
    var chartSelect = document.getElementById("chart-select");
    var ratioSelect = document.getElementById("ratio-select");
    var windowSelect = document.getElementById("last-window-select");
    var formatSelect = document.getElementById("format-select");
    var pixelRatioSelect = document.getElementById("pixel-ratio-select");
    var downloadBtn = document.getElementById("download-btn");
    var downloadBtnLabel = document.getElementById("download-btn-label");
    var pipelineSelect = document.getElementById("pipeline-select");
    var frame = document.getElementById("export-frame");
    var widget = document.getElementById("widget-export-target");
    var chartCanvas = document.getElementById("chart-export-target");
    var titleEl = document.getElementById("export-chart-title");
    var updatedEl = document.getElementById("updated-export-target");
    var subtitleEl = document.getElementById("chart-subtitle-export-target");
    var fontScaleSelect = document.getElementById("font-scale-select");

    var activeWidgetId = "";
    var lastAppliedScale = 1;
    var marketMetaCache = null;
    var protocolPairMeta = null;
    var protocolPairsList = [];

    function selectedRatio() {
      var v = ratioSelect.value.split("x");
      return { w: parseInt(v[0], 10), h: parseInt(v[1], 10) };
    }

    function applyRatio() {
      var r = selectedRatio();
      frame.style.width = r.w + "px";
      frame.style.height = r.h + "px";
      var inst = echarts.getInstanceByDom(chartCanvas);
      if (inst) inst.resize();
    }

    function destroyCurrentChart() {
      var inst = echarts.getInstanceByDom(chartCanvas);
      if (inst) inst.dispose();
    }

    function loadChart() {
      var opt = chartSelect.options[chartSelect.selectedIndex];
      if (!opt || !opt.value) return;

      var widgetId = opt.value;
      var sourceWidgetId = opt.dataset.sourceWidgetId || widgetId;
      var protocolOverride = opt.dataset.protocolOverride || "";
      var endpoint = opt.dataset.endpoint;
      var chartTitle = opt.textContent.trim();

      destroyCurrentChart();

      activeWidgetId = widgetId;
      widget.dataset.widgetId = widgetId;
      widget.dataset.sourceWidgetId = sourceWidgetId;
      if (protocolOverride) {
        widget.dataset.protocolOverride = protocolOverride;
      } else {
        delete widget.dataset.protocolOverride;
      }
      widget.id = "widget-" + widgetId;
      chartCanvas.id = "chart-" + widgetId;
      updatedEl.id = "updated-" + widgetId;
      subtitleEl.id = "chart-subtitle-" + widgetId;
      subtitleEl.textContent = "";
      titleEl.textContent = chartTitle;

      syncWidgetDataAttrs(widgetId);
      updateContextFilters(opt);

      widget.setAttribute("hx-get", endpoint);
      widget.dataset.baseEndpoint = endpoint;

      applyRatio();

      htmx.process(widget);
      htmx.trigger(widget, "export-load");

      downloadBtn.disabled = false;
    }

    function reloadIfActive() {
      if (!activeWidgetId) return;
      syncWidgetDataAttrs(activeWidgetId);
      htmx.trigger(widget, "export-load");
    }

    /* ── Contextual data filters ── */

    var ctxBar       = document.getElementById("export-context-filters");
    var ctxPP        = document.getElementById("ctx-protocol-pair");
    var ctxMkt       = document.getElementById("ctx-markets");
    var ctxFlow      = document.getElementById("ctx-flow-mode");
    var ctxDist      = document.getElementById("ctx-distribution-mode");
    var ctxOhlcv     = document.getElementById("ctx-ohlcv-interval");
    var ctxImpact    = document.getElementById("ctx-impact-mode");
    var ctxHSchema   = document.getElementById("ctx-health-schema");
    var ctxHAttr     = document.getElementById("ctx-health-attribute");
    var mkt1Select   = document.getElementById("mkt1-select");
    var mkt2Select   = document.getElementById("mkt2-select");

    var ALL_CTX = [ctxPP, ctxMkt, ctxFlow, ctxDist, ctxOhlcv, ctxImpact, ctxHSchema, ctxHAttr];

    var WIDGET_FILTER_MAP = {
      "swaps-flows-toggle":        [ctxFlow],
      "swaps-distribution-toggle": [ctxDist],
      "swaps-ohlcv":               [ctxOhlcv],
      "trade-impact-toggle":       [ctxImpact],
      "health-queue-chart":        [ctxHSchema, ctxHAttr],
      "health-queue-chart-2":      [ctxHSchema, ctxHAttr],
      "health-base-chart-events":  [ctxHSchema],
      "health-base-chart-accounts":[ctxHSchema],
    };

    function updateContextFilters(opt) {
      var wid = opt.dataset.sourceWidgetId || opt.value;
      var showPP  = opt.dataset.showPp === "true";
      var showMkt = opt.dataset.showMkt === "true";
      var perWidget = WIDGET_FILTER_MAP[wid] || [];

      for (var i = 0; i < ALL_CTX.length; i++) ALL_CTX[i].hidden = true;

      if (showPP) {
        ctxPP.hidden = false;
        ensureProtocolPairMeta();
      }
      if (showMkt) {
        ctxMkt.hidden = false;
        ensureMarketMeta();
      }
      for (var j = 0; j < perWidget.length; j++) perWidget[j].hidden = false;

      var anyVisible = showPP || showMkt || perWidget.length > 0;
      ctxBar.hidden = !anyVisible;
    }

    function syncWidgetDataAttrs(wid) {
      var flowEl = document.getElementById("export-flow-mode");
      var distEl = document.getElementById("export-distribution-mode");
      var ohlcvEl = document.getElementById("export-ohlcv-interval");
      var impactEl = document.getElementById("export-impact-mode");
      var hSchemaEl = document.getElementById("export-health-schema");
      var hAttrEl = document.getElementById("export-health-attribute");

      widget.dataset.flowMode = flowEl.value;
      widget.dataset.distributionMode = distEl.value;
      widget.dataset.ohlcvInterval = ohlcvEl.value;
      widget.dataset.impactMode = impactEl.value;
      widget.dataset.healthSchema = hSchemaEl.value;
      widget.dataset.healthAttribute = hAttrEl.value;
      widget.dataset.healthBaseSchema = hSchemaEl.value;
    }

    function populateSelect(sel, items, defaultVal, includeNone) {
      sel.innerHTML = "";
      if (includeNone) {
        var none = document.createElement("option");
        none.value = "__none__";
        none.textContent = "None";
        sel.appendChild(none);
      }
      for (var i = 0; i < items.length; i++) {
        var o = document.createElement("option");
        o.value = items[i];
        o.textContent = items[i];
        if (items[i] === defaultVal) o.selected = true;
        sel.appendChild(o);
      }
    }

    function pairsForProtocol(protocol) {
      return protocolPairsList
        .filter(function (item) { return item.protocol === protocol; })
        .map(function (item) { return item.pair; });
    }

    var protocolSelect = document.getElementById("protocol-select");
    var pairSelect     = document.getElementById("pair-select");

    function ensureProtocolPairMeta() {
      if (protocolPairMeta) return Promise.resolve();
      var pl = pipelineSelect ? pipelineSelect.value : "";
      var qs = pl ? "?_pipeline=" + encodeURIComponent(pl) : "";
      var base = document.body.dataset.apiBaseUrl || "";
      return fetch(base + "/api/v1/meta" + qs, { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (payload) {
          if (!payload) return;
          protocolPairMeta = payload;
          protocolPairsList = payload.protocol_pairs || [];
          var protocols = payload.protocols || protocolPairsList.map(function (i) { return i.protocol; });
          var uniqueProto = [];
          for (var k = 0; k < protocols.length; k++) {
            if (uniqueProto.indexOf(protocols[k]) === -1) uniqueProto.push(protocols[k]);
          }
          var curProto = protocolSelect.value || "raydium";
          populateSelect(protocolSelect, uniqueProto, curProto);
          curProto = protocolSelect.value;
          var pairs = pairsForProtocol(curProto);
          populateSelect(pairSelect, pairs, pairSelect.value || (pairs[0] || ""));
          updateFlowModeLabels();
        })
        .catch(function () {});
    }

    function updateFlowModeLabels() {
      var pair = pairSelect.value || "";
      var parts = pair.split("-");
      var t0 = (parts[0] || "T0").trim();
      var t1 = (parts[1] || "T1").trim();
      var flowSel = document.getElementById("export-flow-mode");
      var opt0 = flowSel.querySelector('option[value="usx"]');
      var opt1 = flowSel.querySelector('option[value="usdc"]');
      if (opt0) opt0.textContent = t0;
      if (opt1) opt1.textContent = t1;
    }

    protocolSelect.addEventListener("change", function () {
      var pairs = pairsForProtocol(protocolSelect.value);
      populateSelect(pairSelect, pairs, pairs[0] || "");
      updateFlowModeLabels();
      reloadIfActive();
    });

    pairSelect.addEventListener("change", function () {
      updateFlowModeLabels();
      reloadIfActive();
    });

    function ensureMarketMeta() {
      if (marketMetaCache) return Promise.resolve();
      var pl = pipelineSelect ? pipelineSelect.value : "";
      var qs = pl ? "?_pipeline=" + encodeURIComponent(pl) : "";
      var base = document.body.dataset.apiBaseUrl || "";
      return fetch(base + "/api/v1/exponent/exponent-market-meta" + qs, { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (payload) {
          if (!payload) return;
          var meta = payload.data || payload;
          var markets = meta.markets || [];
          marketMetaCache = meta;
          populateSelect(mkt1Select, markets, meta.selected_mkt1 || "", true);
          var mkt2Default = meta.selected_mkt2 || (markets.length < 2 ? "__none__" : "");
          populateSelect(mkt2Select, markets, mkt2Default, true);
        })
        .catch(function () {});
    }

    [mkt1Select, mkt2Select].forEach(function (sel) {
      sel.addEventListener("change", reloadIfActive);
    });
    ["export-flow-mode", "export-distribution-mode", "export-ohlcv-interval",
     "export-impact-mode", "export-health-schema", "export-health-attribute"
    ].forEach(function (id) {
      document.getElementById(id).addEventListener("change", reloadIfActive);
    });

    /* ── Font scaling ── */

    function scaleFontSizes(obj, factor) {
      if (!obj || typeof obj !== "object") return;
      if (Array.isArray(obj)) {
        for (var i = 0; i < obj.length; i++) scaleFontSizes(obj[i], factor);
        return;
      }
      for (var key in obj) {
        if (!obj.hasOwnProperty(key)) continue;
        if (key === "fontSize" && typeof obj[key] === "number") {
          obj[key] = Math.round(obj[key] * factor);
        } else if (typeof obj[key] === "object") {
          scaleFontSizes(obj[key], factor);
        }
      }
    }

    function scaleNumericKeys(items, keys, factor) {
      if (!items) return;
      var arr = Array.isArray(items) ? items : [items];
      for (var i = 0; i < arr.length; i++) {
        if (!arr[i]) continue;
        for (var k = 0; k < keys.length; k++) {
          if (typeof arr[i][keys[k]] === "number") {
            arr[i][keys[k]] = Math.round(arr[i][keys[k]] * factor);
          }
        }
      }
    }

    var baseOption = null;

    function captureBaseOption(inst) {
      var raw = inst.getOption();
      baseOption = JSON.parse(JSON.stringify(raw));
    }

    function applyFontScale() {
      var inst = echarts.getInstanceByDom(chartCanvas);
      if (!inst) return;
      var targetScale = parseFloat(fontScaleSelect.value) || 1;
      if (targetScale === 1 && lastAppliedScale === 1) return;

      if (!baseOption) captureBaseOption(inst);

      var option = JSON.parse(JSON.stringify(baseOption));

      if (targetScale !== 1) {
        scaleFontSizes(option, targetScale);

        var sp = Math.pow(targetScale, 1.5);
        scaleNumericKeys(option.grid, ["left", "right", "top", "bottom"], sp);
        scaleNumericKeys(option.legend, ["bottom", "top", "left", "right", "padding", "itemGap", "itemWidth", "itemHeight"], sp);
        scaleNumericKeys(option.xAxis, ["nameGap"], sp);
        scaleNumericKeys(option.yAxis, ["nameGap"], sp);
        scaleNumericKeys(option.dataZoom, ["bottom", "top", "left", "right", "height"], sp);

        var minSide = Math.round(20 * targetScale);
        var minVert = Math.round(15 * targetScale);
        var grids = option.grid ? (Array.isArray(option.grid) ? option.grid : [option.grid]) : [];
        for (var g = 0; g < grids.length; g++) {
          if (!grids[g]) continue;
          grids[g].containLabel = true;
          var sides = ["left", "right"];
          for (var s = 0; s < sides.length; s++) {
            if (typeof grids[g][sides[s]] === "number" && grids[g][sides[s]] < minSide)
              grids[g][sides[s]] = minSide;
          }
          var verts = ["top", "bottom"];
          for (var v = 0; v < verts.length; v++) {
            if (typeof grids[g][verts[v]] === "number" && grids[g][verts[v]] < minVert)
              grids[g][verts[v]] = minVert;
          }
        }
      }

      inst.setOption(option);
      lastAppliedScale = targetScale;
    }

    document.body.addEventListener("htmx:afterRequest", function (event) {
      var el = event.detail.elt;
      if (!el || el !== widget) return;
      if (!event.detail.successful) return;
      lastAppliedScale = 1;
      baseOption = null;
      setTimeout(applyFontScale, 50);
    });

    fontScaleSelect.addEventListener("change", applyFontScale);

    /* ── Pipeline switcher ── */

    if (pipelineSelect) {
      fetch("/api/pipeline-info")
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (!data || !data.current) return;
          for (var i = 0; i < pipelineSelect.options.length; i++) {
            pipelineSelect.options[i].selected = (pipelineSelect.options[i].value === data.current);
          }
        })
        .catch(function () {});

      pipelineSelect.addEventListener("change", function () {
        pipelineSelect.disabled = true;
        marketMetaCache = null;
        protocolPairMeta = null;
        fetch("/api/switch-pipeline?pipeline=" + encodeURIComponent(pipelineSelect.value), { method: "POST" })
          .then(function () {
            var pending = [];
            if (!ctxPP.hidden) pending.push(ensureProtocolPairMeta());
            if (!ctxMkt.hidden) pending.push(ensureMarketMeta());
            return Promise.all(pending);
          })
          .then(function () {
            pipelineSelect.disabled = false;
            reloadIfActive();
          })
          .catch(function () {
            pipelineSelect.disabled = false;
          });
      });
    }

    /* ── Format selector ── */

    var FORMAT_LABELS = { webp: "WebP", png: "PNG", jpeg: "JPEG" };
    var FORMAT_EXT = { webp: "webp", png: "png", jpeg: "jpg" };

    formatSelect.addEventListener("change", function () {
      downloadBtnLabel.textContent = "Download " + FORMAT_LABELS[formatSelect.value];
    });

    /* ── Event bindings ── */

    chartSelect.addEventListener("change", loadChart);
    ratioSelect.addEventListener("change", applyRatio);
    windowSelect.addEventListener("change", reloadIfActive);

    /* ── Download with format support ── */

    function triggerDownload(dataUrl, ext) {
      var ratioLabel = ratioSelect.value;
      var filename = activeWidgetId + "_" + ratioLabel + "." + ext;
      var link = document.createElement("a");
      link.href = dataUrl;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    downloadBtn.addEventListener("click", function () {
      var inst = echarts.getInstanceByDom(chartCanvas);
      if (!inst) return;

      var theme = document.documentElement.getAttribute("data-theme");
      var bgColor = theme === "light" ? "#ffffff" : "#0f1a2d";
      var pxRatio = parseInt(pixelRatioSelect.value, 10) || 2;
      var fmt = formatSelect.value;
      var ext = FORMAT_EXT[fmt];

      var pngDataUrl = inst.getDataURL({
        type: "png",
        pixelRatio: pxRatio,
        backgroundColor: bgColor,
      });

      if (fmt === "png") {
        triggerDownload(pngDataUrl, ext);
        return;
      }

      var img = new Image();
      img.onload = function () {
        var cvs = document.createElement("canvas");
        cvs.width = img.width;
        cvs.height = img.height;
        var ctx = cvs.getContext("2d");
        ctx.drawImage(img, 0, 0);
        var mime = fmt === "webp" ? "image/webp" : "image/jpeg";
        var quality = fmt === "webp" ? 0.92 : 0.95;
        triggerDownload(cvs.toDataURL(mime, quality), ext);
      };
      img.src = pngDataUrl;
    });
  })();
  </script>
</body>
</html>
